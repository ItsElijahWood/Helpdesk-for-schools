<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{ title }}</title>
        <link rel="icon" href="/assets/favicon.ico" />
    </head>
    <body>
        <div>
            <h1>Unassigned Tickets</h1>
            <p id="unassigned-ticket-value"></p>
        </div>
    </body>
    <script type="module">
        let polling = false;

        await helpdeskInfo();
        setInterval(async () => {
            if (!polling) {
                await helpdeskInfo();
            }
        }, 15000);

        async function helpdeskInfo() {
            polling = true;

            try {
                const response = await fetch(
                    "http://localhost:3000/api/integrations/fresh-service",
                    {
                        method: "GET",
                    },
                );

                if (response.ok) {
                    const data = await response.json();

                    for (const d of data) {
                        if (d.ut) {
                            document.getElementById(
                                "unassigned-ticket-value",
                            ).innerHTML = d.ut.total;

                            if (d.ut.total > 0) {
                                await unassignedAlarmTrigger();
                            }
                        }
                    }
                } else {
                    console.error(
                        "Failed to fetch helpdesk information. Check the rust console for any errors.",
                    );
                }
            } finally {
                polling = false;
            }
        }

        async function unassignedAlarmTrigger() {
            const response = await fetch(`/api/misc/fs/notify`, {
                method: "GET",
            });

            if (!response.ok) {
                console.error("Failed to play fs notify audio.");
            }
        }
    </script>
</html>
